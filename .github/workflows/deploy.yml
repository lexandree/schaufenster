name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Stable LTS

      - name: Install dependencies
        run: npm install

      - name: Sync External Projects
        run: |
          mkdir -p src/content/projects
          curl -s -f https://raw.githubusercontent.com/lexandree/roentgen-for-docs/main/portfolio-export.md -o src/content/projects/roentgen-for-docs.md || echo "Failed to fetch roentgen-for-docs."
          curl -s -f https://raw.githubusercontent.com/lexandree/tv-audience-forecaster/main/portfolio-export.md -o src/content/projects/tv-audience-forecaster.md || echo "Failed to fetch tv-audience-forecaster."
          curl -s -f https://raw.githubusercontent.com/lexandree/vae-marketing/main/portfolio-export.md -o src/content/projects/vae-marketing.md || echo "Failed to fetch vae-marketing."
          
          echo "Fetching assets for vae-marketing..."
          mkdir -p public/assets/vae-marketing
          FILES="training_curves.svg beta_annealing.svg sweep_parallel_coords.svg sweep_parallel_coords.html"
          for FILE in $FILES; do
            curl -s -f "https://raw.githubusercontent.com/lexandree/vae-marketing/main/docs/images/${FILE}" -o "public/assets/vae-marketing/${FILE}" || echo "Failed to fetch $FILE"
          done

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
