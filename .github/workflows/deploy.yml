name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [portfolio-update]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Sync External Projects
        run: |
          echo "Fetching latest project descriptions from external repositories..."
          
          # Read the project from the dispatch payload
          PAYLOAD_PROJECT="${{ github.event.client_payload.project }}"
          
          if [ -n "$PAYLOAD_PROJECT" ]; then
            # Protect against underscore vs hyphen typos (e.g. roentgen_for_docs -> roentgen-for-docs)
            PROJECT=$(echo "$PAYLOAD_PROJECT" | tr '_' '-')
            echo "Webhook triggered by specific project: $PROJECT"
            
            if curl -s -f "https://raw.githubusercontent.com/lexandree/${PROJECT}/main/portfolio-export.md" -o "tmp_${PROJECT}.md"; then
              mv "tmp_${PROJECT}.md" "src/content/projects/${PROJECT}.md"
              echo "Successfully synced $PROJECT"
            else
              echo "Failed to fetch $PROJECT, keeping existing local copy."
            fi
          else
            echo "Manual or push trigger. Syncing all known projects..."
            PROJECTS="roentgen-for-docs tv-audience-forecaster"
            
            for PROJECT in $PROJECTS; do
              if curl -s -f "https://raw.githubusercontent.com/lexandree/${PROJECT}/main/portfolio-export.md" -o "tmp_${PROJECT}.md"; then
                mv "tmp_${PROJECT}.md" "src/content/projects/${PROJECT}.md"
                echo "Successfully synced $PROJECT"
              else
                echo "Could not fetch $PROJECT (maybe it is not public yet or file is missing)"
              fi
            done
          fi

      - name: Install, build, and upload your site
        uses: withastro/action@v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
