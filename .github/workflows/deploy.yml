name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [portfolio-update]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Stable LTS

      - name: Install dependencies
        run: npm install

      - name: Sync External Projects
        shell: bash
        run: |
          echo "Starting full synchronization of all external projects..."
          mkdir -p src/content/projects

          PROJECTS="roentgen-for-docs tv-audience-forecaster vae-marketing"
          for PROJECT in $PROJECTS; do
            echo "Attempting to sync $PROJECT..."
            
            URL="https://raw.githubusercontent.com/lexandree/${PROJECT}/main/portfolio-export.md"
            if curl -s -f "$URL" -o "src/content/projects/${PROJECT}.md"; then
              echo "✓ Successfully synced Markdown for $PROJECT"
              
              if [ "$PROJECT" = "vae-marketing" ]; then
                echo "Fetching assets for $PROJECT..."
                mkdir -p public/assets/vae-marketing
                FILES="training_curves.svg beta_annealing.svg sweep_parallel_coords.svg sweep_parallel_coords.html"
                for FILE in $FILES; do
                  ASSET_URL="https://raw.githubusercontent.com/lexandree/${PROJECT}/main/docs/images/${FILE}"
                  curl -s -f "$ASSET_URL" -o "public/assets/vae-marketing/${FILE}" || echo "  ! Missing asset: $FILE"
                done
              fi
            else
              echo "  ! Failed to fetch $PROJECT from $URL (using local version if available)"
            fi
          done

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
