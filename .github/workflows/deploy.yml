name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [portfolio-update]

# Global environment variables to address deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Sync External Projects
        shell: bash
        run: |
          echo "Starting synchronization of external project descriptions..."
          
          # 1. Determine which project to sync
          PAYLOAD_PROJECT="${{ github.event.client_payload.project }}"
          
          if [ -n "$PAYLOAD_PROJECT" ] && [ "$PAYLOAD_PROJECT" != "null" ]; then
            # Sync only the project mentioned in the payload
            PROJECT=$(echo "$PAYLOAD_PROJECT" | tr '_' '-')
            echo "Specific project update requested: $PROJECT"
            PROJECTS_TO_SYNC="$PROJECT"
          else
            # Default: Sync all known projects
            echo "Full sync triggered (manual, push, or empty payload)."
            PROJECTS_TO_SYNC="roentgen-for-docs tv-audience-forecaster vae-marketing"
          fi

          # 2. Perform sync
          for PROJECT in $PROJECTS_TO_SYNC; do
            echo "Attempting to sync $PROJECT..."
            
            # Fetch Markdown
            URL="https://raw.githubusercontent.com/lexandree/${PROJECT}/main/portfolio-export.md"
            if curl -s -f "$URL" -o "src/content/projects/${PROJECT}.md"; then
              echo "✓ Successfully synced Markdown for $PROJECT"
              
              # Special assets sync for vae-marketing
              if [ "$PROJECT" = "vae-marketing" ]; then
                echo "Fetching images for $PROJECT..."
                mkdir -p public/assets/vae-marketing
                FILES="training_curves.svg beta_annealing.svg sweep_parallel_coords.svg sweep_parallel_coords.html"
                for FILE in $FILES; do
                  ASSET_URL="https://raw.githubusercontent.com/lexandree/${PROJECT}/main/docs/images/${FILE}"
                  curl -s -f "$ASSET_URL" -o "public/assets/vae-marketing/${FILE}" || echo "  ! Failed to fetch asset: $FILE"
                done
              fi
            else
              echo "  ! Failed to fetch $PROJECT from $URL (skipping or using local cache)"
            fi
          done
          echo "Sync step completed."

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          node-version: 22 # Use stable LTS

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
