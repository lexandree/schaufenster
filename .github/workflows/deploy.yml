name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [portfolio-update]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Sync External Projects
        run: |
          echo "Fetching latest project descriptions from external repositories..."
          
          # Fetch from roentgen-for-docs
          if curl -s -f https://raw.githubusercontent.com/lexandree/roentgen-for-docs/main/portfolio-export.md -o tmp_roentgen.md; then
            mv tmp_roentgen.md src/content/projects/roentgen-for-docs.md
            echo "Successfully synced roentgen-for-docs"
          else
            echo "Failed to fetch roentgen-for-docs, keeping existing local copy."
          fi

          # Future proofing: you can add other repositories here like tv_audience_forecasting
          # if curl -s -f https://raw.githubusercontent.com/lexandree/tv-audience-forecaster/main/portfolio-export.md -o tmp_tv.md; then
          #   mv tmp_tv.md src/content/projects/tv-audience-forecaster.md
          # fi

      - name: Install, build, and upload your site
        uses: withastro/action@v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
